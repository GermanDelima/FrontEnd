<!-- HTML con las correcciones aplicadas -->
<div class="row">
  <div>
    <div class="text-center">
      <button type="button" class="btn btn-success" (click)="onOpenModal('add')">
        <span style="color: aliceblue">añadir educación<span class="sr-only"> (current)</span></span>
      </button>
    </div>
  </div>

  <!-- Contenedor para los elementos de educación con la clase 'col-lg-4' aplicada -->
  <div class="col-lg-4 list-group-item" *ngFor="let education of educations">
    <h2>Educación</h2>
    <div class="col text-center">
      <!--f-->
      <a (click)="onOpenModal('edit',education)" class="btn btn-primary tooltips" data-placement="top" data-toggle="tooltip" title="Edit">
        <i class="fa fa-pencil"></i>
      </a>
      <!--f-->
      <a (click)="onOpenModal('delete',education)" class="btn btn-danger tooltips" data-placement="top" data-toggle="tooltip" title="Delete">
        <i class="fa fa-times"></i>
      </a>
    </div>
    <div class="col-lg-12" id="Center"><img [src]="education.imgEdu" width="300rem"></div>
    <div class="col-lg-12" id="Center"> <p><strong>Título:</strong> {{education.tituloEdu}}</p></div>
    <div class="col-lg-12" id="Center"><p><strong>Período:</strong> {{education.fechaEdu}}</p></div>
    <div class="col-lg-6"><p><strong>Descripción:</strong> {{education.descEdu}}.</p></div>
  </div>

  <!-- Modal añadir educacion -->
  <div class="modal fade" id="addEducationModal" tabindex="-1" role="dialog" aria-labelledby="addEducationModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="addEducationModalLabel">Añadir educación</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form #addForm="ngForm" (ngSubmit)="onAddEducation(addForm)">
            <div class="mb-3">
              <label for="tituloEdu" class="form-label">Título</label>
              <input type="text" ngModel name="tituloEdu" class="form-control" id="tituloEdu" placeholder="Título" required>
            </div>
            <div class="mb-3">
              <label for="fechaEdu" class="form-label">Fecha</label>
              <input type="text" ngModel name="fechaEdu" class="form-control" id="fechaEdu" placeholder="Fecha" required>
            </div>
            <div class="mb-3">
              <label for="descEdu" class="form-label">Descripción</label>
              <input type="text" ngModel name="descEdu" class="form-control" id="descEdu" placeholder="Descripción" required>
            </div>
            <div class="mb-3">
              <label for="imgEdu" class="form-label">Imagen</label>
              <input type="text" ngModel name="imgEdu" class="form-control" id="imgEdu" placeholder="Imagen" required>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
              <button [disabled]="addForm.invalid" type="submit" class="btn btn-primary">Añadir cambios</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

</div>
